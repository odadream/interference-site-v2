name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_ANALYTICS_ENABLED: ${{ vars.VITE_ANALYTICS_ENABLED }}
      VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
      VITE_YANDEX_METRICA_ID: ${{ vars.VITE_YANDEX_METRICA_ID }}
      VITE_ANALYTICS_CONSENT_MODE: ${{ vars.VITE_ANALYTICS_CONSENT_MODE }}
      VITE_YANDEX_WEBVISOR: ${{ vars.VITE_YANDEX_WEBVISOR }}
      VITE_ANALYTICS_DEBUG: "false"
      VITE_ANALYTICS_PROJECT_ID: interference-realities
      VITE_ANALYTICS_CAMPAIGN_ID: interference-touring-2026
      VITE_ANALYTICS_SITE_ID: interference-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify analytics bundle
        run: npm run analytics:verify-build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
